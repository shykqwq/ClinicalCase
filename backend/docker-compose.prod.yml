services:
  postgres:
    image: postgres:16-alpine
    container_name: clinical-case-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: clinical_case
      POSTGRES_USER: clinical_case
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - clinical_case_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical_case -d clinical_case"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    container_name: clinical-case-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  clinical_case_postgres_data:
