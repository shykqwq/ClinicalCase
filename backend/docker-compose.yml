services:
  postgres:
    image: postgres:16-alpine
    container_name: clinical-case-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinical_case
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clinical_case_postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinical_case"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clinical_case_postgres_data:
